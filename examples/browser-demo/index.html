<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPSS SDK Browser Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 24px; background: #0f0f0f; color: #e0e0e0; }
    h1 { margin-bottom: 16px; font-size: 20px; }
    .section { margin-bottom: 24px; }
    .section h2 { font-size: 14px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 4px; }
    button:hover { background: #1d4ed8; }
    button.secondary { background: #374151; }
    button.danger { background: #dc2626; }
    #log { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #222; }
    .log-info { color: #60a5fa; }
    .log-event { color: #34d399; }
    .log-warn { color: #fbbf24; }
  </style>
</head>
<body>
  <h1>APPSS SDK Browser Demo</h1>

  <div class="section">
    <h2>Tracking</h2>
    <button id="btn-page-view">Track Page View</button>
    <button id="btn-purchase">Track Purchase</button>
    <button id="btn-custom">Track Custom Event</button>
  </div>

  <div class="section">
    <h2>Identity</h2>
    <button id="btn-reidentify" class="secondary">Re-identify (user-42)</button>
    <button id="btn-props" class="secondary">Set User Properties</button>
  </div>

  <div class="section">
    <h2>Controls</h2>
    <button id="btn-flush" class="secondary">Manual Flush</button>
    <button id="btn-consent" class="secondary">Toggle Opt-Out</button>
    <button id="btn-destroy" class="danger">Destroy SDK</button>
  </div>

  <div class="section">
    <h2>Log</h2>
    <div id="log"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
